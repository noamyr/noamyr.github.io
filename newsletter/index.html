<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="The Archive of Patchy Studies is a publishing platform for diagrammatic thinking, speculative writing, and reflections on creative labor under racial capitalism.">
  <title>The Archive of Patchy Studies</title>
  <link rel="icon" type="image/png" href="spider-web.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main id="diagram-container" aria-label="Interactive diagram of the Archive of Patchy Studies">
    <div id="loading-state" role="status" aria-live="polite">Loading archive…</div>

    <aside id="interface-panel" aria-label="Diagram controls">
      <div class="panel-heading">
        <div>
          <div class="panel-title">Diagram controls</div>
          <div id="result-count" class="result-count" aria-live="polite"></div>
        </div>
        <button id="reset-controls" class="text-button" type="button">Reset</button>
      </div>

      <div class="mode-control" role="group" aria-label="Diagram mode">
        <span class="mode-label">Explore</span>
        <label class="mode-switch">
          <input id="focus-mode-toggle" type="checkbox" aria-label="Toggle focus mode">
          <span class="mode-switch-track" aria-hidden="true">
            <span class="mode-switch-thumb"></span>
          </span>
        </label>
        <span class="mode-label">Focus</span>
      </div>

      <p id="mode-description" class="mode-description">
        Explore the full filtered diagram.
      </p>

      <label class="search-field" for="node-search">
        <span>Search by number or keyword</span>
        <input
          id="node-search"
          type="search"
          inputmode="search"
          autocomplete="off"
          placeholder="e.g. 21, attention, Ursula K. Le Guin">
      </label>

      <fieldset id="legend" class="legend">
        <legend>Visibility</legend>
        <div id="legend-items" class="legend-items"></div>
      </fieldset>

      <p class="interaction-note">
        In focus mode, select a node to show its immediate relations. Select a neighbouring node to continue through the network.
      </p>
    </aside>

    <nav id="nav-controls" aria-label="Navigate numbered studies">
      <div id="current-node-number" aria-live="polite">—</div>
      <button id="prev-node" type="button" aria-label="Previous numbered study" title="Previous numbered study">↑</button>
      <button id="next-node" type="button" aria-label="Next numbered study" title="Next numbered study">↓</button>
      <button id="random-node" type="button" aria-label="Random numbered study" title="Random numbered study">↝</button>
    </nav>

    <div id="preview" role="dialog" aria-live="polite" aria-label="Node details">
      <button id="preview-close" type="button" aria-label="Close node details">×</button>
      <div id="preview-content"></div>
    </div>

    <div id="site-title">The Archive of Patchy Studies</div>

    <nav id="bottom-buttons" aria-label="External links">
      <a href="https://noamyr.substack.com/subscribe" target="_blank" rel="noopener noreferrer">Subscribe</a>
      <a href="https://noamyr.substack.com/about" target="_blank" rel="noopener noreferrer">About</a>
      <a href="https://www.d-act.org" target="_blank" rel="noopener noreferrer">Bio</a>
      <a href="https://www.instagram.com/noam_yr/" target="_blank" rel="noopener noreferrer">IG</a>
    </nav>
  </main>

  <script type="module" src="js/diagramView.js"></script>
</body>
</html>
